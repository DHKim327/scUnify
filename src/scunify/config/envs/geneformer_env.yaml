name: geneformer_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26,<2.0
  - scipy>=1.11
  - pandas>=2.0
  - scanpy>=1.9
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - --extra-index-url https://pypi.org/simple
      - torch>=2.0.1
      - transformers==4.46
      - datasets>=2.12
      - anndata>=0.9
      - accelerate>=1
      - peft==0.14.0
