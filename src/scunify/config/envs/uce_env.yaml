name: uce_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26,<2.0
  - scipy>=1.11
  - pandas>=2.0
  - scanpy>=1.9
  - tqdm>=4.60
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - --extra-index-url https://pypi.org/simple
      - torch>=2.0
      - accelerate>=0.24
      - peft==0.14.0
