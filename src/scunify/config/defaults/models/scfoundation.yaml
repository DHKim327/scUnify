# scFoundation — model-specific configuration

model_name: scFoundation

preprocessing:
  option: "F"
  normalize_total: 10000.0
  log1p: true

model:
  version: cell
  pool_type: all
  tgthighres: t4

dataloader:
  batch_size: 1
  num_workers: 0
  seed: 0

training:
  mae:
    mask_ratio: 0.4

resources:
  model_file: "{resource_dir}/scFoundation/models.ckpt"
  gene_list: "{resource_dir}/scFoundation/OS_scRNA_gene_index.19264.tsv"
