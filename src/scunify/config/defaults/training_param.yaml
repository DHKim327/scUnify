# scUnify Training Default Parameters
# All models share these defaults; model-specific overrides go in models/*.yaml

training:
  mode: "lora"
  epochs: 50
  gradient_accumulation_steps: 1

  # --- Task configuration ---
  task: "pretraining"                 # pretraining | classification | perturbation | regression | integration
  task_param:                         # task-specific params, read by Mixin
    mixin: null                       # built-in or user-registered Mixin name (overrides task default)
  label_keys: []                      # adata.obs columns to pass through to batch

  lora:
    adapter_type: "lora"              # lora | dora | rslora | adalora | loha | lokr | ia3 | oft
    rank: 8
    alpha: 8                          # scaling = alpha/rank
    dropout: 0.0
    targets:
      - query
      - value
    layer_strategy: "first"           # "first" | "last" | "all"
    layer_ratio: 0.5                  # 50% of total layers
    # adapter-specific params added here are passed through to PEFT config

  optimizer:
    type: "adam"                       # adam (not adamw); scPEFT default
    lr: 1.0e-5
    betas: [0.9, 0.999]
    weight_decay: 0.0

  scheduler:
    type: "cosine"
    warmup_ratio: 0.9                 # 90% warmup → 10% cosine decay

  early_stopping:
    patience: 5
    monitor: "val_loss"
    min_delta: 0.0

  split:
    fold_keys: null                   # obs column(s) with "train"/"valid"/("test") labels
                                      # e.g. ["fold_0", "fold_1", "fold_2"]
                                      # or single: "split"

save:
  checkpoint: true                    # LoRA adapter weights (adapter_model.safetensors)
  merged_model: true                  # merge LoRA into base model and save
  output_keys:                        # what to extract and save after training
    - cell_embedding                  # get_cell_embedding → obsm["X_cell_embedding"]
